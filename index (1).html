        const sorted=[...subs].sort((a,b)=>new Date(a.submittedAt)-new Date(b.submittedAt));
        const labels=sorted.map(s=>{ const a=DB.getAssignmentById(s.assignmentId); return a?a.title.slice(0,10)+'..':''; });
        const data=sorted.map(s=>s.score);
        App.charts['studentGradeChart']=new Chart(ctx,{
          type:'line',
          data:{labels,datasets:[{label:'Score %',data,backgroundColor:'rgba(79,70,229,0.1)',borderColor:'rgba(79,70,229,1)',borderWidth:2.5,fill:true,tension:0.4,pointBackgroundColor:data.map(d=>getGradeColor(d)),pointRadius:5}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,grid:{color:'rgba(128,128,128,0.1)'},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}
        });
      } else if(ctx){
        const parent=ctx.parentElement; parent.innerHTML=`<div class="empty-state" style="height:100%"><i class="fas fa-chart-line"></i><p>No grade data yet</p></div>`;
      }
    });
  },

  renderAssignments(container){
    App.setTopbarTitle('My Assignments','View and complete your assignments');
    const student=App.currentUser;
    const assignments=this.getMyAssignments();
    const subs=DB.getSubmissions().filter(s=>s.studentId===student.id);

    container.innerHTML=`
      <div class="section-panel active">
        <div class="page-header">
          <div class="page-header-left"><h1>My Assignments</h1><p>Section ${student.section} — ${assignments.length} total</p></div>
        </div>
        <div class="filter-bar">
          <button class="btn btn-secondary filter-tab active" data-tab="all" onclick="StudentDash.filterTab(this,'all')">All</button>
          <button class="btn btn-secondary filter-tab" data-tab="pending" onclick="StudentDash.filterTab(this,'pending')">Pending</button>
          <button class="btn btn-secondary filter-tab" data-tab="submitted" onclick="StudentDash.filterTab(this,'submitted')">Submitted</button>
        </div>
        <div id="assignmentsList">
          ${this.buildAssignmentsList(assignments, subs, 'all')}
        </div>
      </div>`;
  },

  filterTab(el, tab){
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    const student=App.currentUser;
    const assignments=this.getMyAssignments();
    const subs=DB.getSubmissions().filter(s=>s.studentId===student.id);
    document.getElementById('assignmentsList').innerHTML=this.buildAssignmentsList(assignments, subs, tab);
  },

  buildAssignmentsList(assignments, subs, tab){
    let filtered=assignments;
    if(tab==='pending') filtered=assignments.filter(a=>!subs.find(s=>s.assignmentId===a.id));
    if(tab==='submitted') filtered=assignments.filter(a=>!!subs.find(s=>s.assignmentId===a.id));
    if(!filtered.length) return `<div class="empty-state"><i class="fas fa-tasks"></i><h3>No assignments here</h3></div>`;
    return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
      ${filtered.map(a=>{
        const sub=subs.find(s=>s.assignmentId===a.id);
        const over=isOverdue(a.deadline); const soon=isDeadlineSoon(a.deadline);
        const acColor=sub?'var(--success)':over?'var(--danger)':soon?'var(--warning)':'var(--primary)';
        return `<div class="assignment-card" style="--ac:${acColor};cursor:default">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div class="assignment-card-title">${escHtml(a.title)}</div>
            <span class="badge badge-${sub?'success':over?'danger':soon?'warning':'gray'}">${sub?'Submitted':over?'Overdue':soon?'Due Soon':'Pending'}</span>
          </div>
          <div class="assignment-card-meta">
            <span><i class="fas fa-question-circle"></i> ${a.questions.length} questions</span>
            <span style="color:${over&&!sub?'var(--danger)':soon&&!sub?'var(--warning)':'var(--text3)'}"><i class="fas fa-clock"></i> ${a.deadline?formatDate(a.deadline):'No deadline'}</span>
          </div>
          ${a.description?`<div class="assignment-card-desc">${escHtml(a.description)}</div>`:''}
          ${sub?`<div style="margin-top:12px;padding:10px 14px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:9px;display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:13px;color:var(--text2)">Your Score:</span>
            <span style="font-size:18px;font-weight:700;color:${getGradeColor(sub.score)}">${sub.score}% <span style="font-size:13px">(${getGradeLabel(sub.score)})</span></span>
          </div>
          <button class="btn btn-secondary" style="width:100%;margin-top:10px" onclick="StudentDash.reviewAssignment('${a.id}')"><i class="fas fa-eye"></i> Review Answers</button>`
          :!over?`<button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="StudentDash.openTakeAssignment('${a.id}')"><i class="fas fa-pencil-alt"></i> Start Assignment</button>`
          :`<button class="btn" style="width:100%;margin-top:12px;background:var(--bg);color:var(--text3);cursor:not-allowed" disabled><i class="fas fa-lock"></i> Deadline Passed</button>`}
        </div>`;
      }).join('')}
    </div>`;
  },

  openTakeAssignment(assignmentId){
    const assignment=DB.getAssignmentById(assignmentId);
    if(!assignment){ UI.showToast('Error','Assignment not found','danger'); return; }
    const existing=DB.getSubmissionByStudentAndAssignment(App.currentUser.id, assignmentId);
    if(existing){ UI.showToast('Already Submitted','You have already submitted this assignment','info'); return; }
    // Build modal
    const html=`<div class="modal-overlay" id="takeAssignModal">
      <div class="modal modal-xl">
        <div class="modal-header">
          <div>
            <h3>${escHtml(assignment.title)}</h3>
            <span style="font-size:12px;color:var(--text3)">${assignment.questions.length} questions · ${assignment.deadline?'Due: '+formatDate(assignment.deadline):'No deadline'}</span>
          </div>
          <div class="modal-close" onclick="StudentDash.confirmClose()"><i class="fas fa-times"></i></div>
        </div>
        <div class="modal-body">
          ${assignment.description?`<div style="background:rgba(79,70,229,0.06);border:1px solid rgba(79,70,229,0.15);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--text2)">${escHtml(assignment.description)}</div>`:''}
          ${assignment.questions.map((q,qi)=>`<div style="margin-bottom:24px" id="q_container_${qi}">
            <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px"><span style="color:var(--primary)">Q${qi+1}.</span> ${escHtml(q.text)}</div>
            ${q.options.map((opt,oi)=>`<div class="mcq-option" id="opt_${qi}_${oi}" onclick="StudentDash.selectOption(${qi},${oi})">
              <div class="mcq-letter">${['A','B','C','D'][oi]}</div>
              <div class="mcq-text">${escHtml(opt)}</div>
            </div>`).join('')}
          </div>`).join('')}
        </div>
        <div class="modal-footer" style="justify-content:space-between">
          <span style="font-size:12px;color:var(--text3)" id="answeredCount">0/${assignment.questions.length} answered</span>
          <div style="display:flex;gap:10px">
            <button class="btn btn-secondary" onclick="StudentDash.confirmClose()">Cancel</button>
            <button class="btn btn-primary" onclick="StudentDash.submitAssignment('${assignmentId}')"><i class="fas fa-paper-plane"></i> Submit</button>
          </div>
        </div>
      </div>
    </div>`;
    const existing2=document.getElementById('takeAssignModal');
    if(existing2) existing2.remove();
    document.body.insertAdjacentHTML('beforeend',html);
    window._answers={};
    window._totalQ=assignment.questions.length;
    UI.openModal('takeAssignModal');
  },

  selectOption(qi, oi){
    // Deselect all options for this question
    for(let i=0;i<4;i++){
      const el=document.getElementById(`opt_${qi}_${i}`);
      if(el){ el.classList.remove('selected'); el.querySelector('.mcq-letter').style.background=''; el.querySelector('.mcq-letter').style.borderColor=''; el.querySelector('.mcq-letter').style.color=''; }
    }
    // Select clicked
    const el=document.getElementById(`opt_${qi}_${oi}`);
    if(el) el.classList.add('selected');
    window._answers[qi]=oi;
    const count=Object.keys(window._answers||{}).length;
    const el2=document.getElementById('answeredCount');
    if(el2) el2.textContent=count+'/'+(window._totalQ||0)+' answered';
  },

  confirmClose(){
    Swal.fire({title:'Exit Assignment?',text:'Your answers will not be saved.',icon:'warning',showCancelButton:true,confirmButtonText:'Yes, exit',confirmButtonColor:'#ef4444'})
      .then(r=>{ if(r.isConfirmed){ UI.closeModal('takeAssignModal'); document.getElementById('takeAssignModal')?.remove(); } });
  },

  submitAssignment(assignmentId){
    const assignment=DB.getAssignmentById(assignmentId);
    if(!assignment) return;
    const answers=window._answers||{};
    if(Object.keys(answers).length<assignment.questions.length){
      Swal.fire({title:'Incomplete!',text:`You've answered ${Object.keys(answers).length}/${assignment.questions.length} questions. Submit anyway?`,icon:'warning',showCancelButton:true,confirmButtonText:'Submit Anyway',confirmButtonColor:'#4f46e5'})
        .then(r=>{ if(r.isConfirmed) this._doSubmit(assignment, answers); });
    } else { this._doSubmit(assignment, answers); }
  },

  _doSubmit(assignment, answers){
    let correct=0;
    assignment.questions.forEach((q,i)=>{ if(answers[i]===q.correctAnswer) correct++; });
    const score=Math.round((correct/assignment.questions.length)*100);
    const submission={ id:DB.uid(), assignmentId:assignment.id, studentId:App.currentUser.id, answers:Object.values(answers), score, submittedAt:new Date().toISOString() };
    const subs=DB.getSubmissions(); subs.push(submission); DB.saveSubmissions(subs);
    DB.addNotification(App.currentUser.id,'Assignment Submitted',`You scored ${score}% on "${assignment.title}"`,'grade',assignment.id);
    UI.closeModal('takeAssignModal');
    document.getElementById('takeAssignModal')?.remove();
    // Show result
    Swal.fire({
      title:'Assignment Submitted!',
      html:`<div class="score-display">
        <div class="score-circle" style="--pct:${score}"><div class="score-inner"><div class="pct">${score}%</div><div class="lbl">${getGradeLabel(score)}</div></div></div>
        <h3 style="color:${getGradeColor(score)};margin-bottom:8px">${score>=90?'Excellent! 🎉':score>=75?'Great Job! 👍':score>=60?'Good Effort! 💪':'Keep Studying! 📚'}</h3>
        <p style="color:#64748b;font-size:14px">${correct} correct out of ${assignment.questions.length} questions</p>
      </div>`,
      confirmButtonText:'View Results', confirmButtonColor:'#4f46e5'
    }).then(()=>{ App.showSection('assignments'); });
  },

  reviewAssignment(assignmentId){
    const assignment=DB.getAssignmentById(assignmentId);
    if(!assignment) return;
    const sub=DB.getSubmissionByStudentAndAssignment(App.currentUser.id, assignmentId);
    if(!sub){ UI.showToast('Error','Submission not found','danger'); return; }
    const html=`<div class="modal-overlay" id="reviewModal">
      <div class="modal modal-xl">
        <div class="modal-header">
          <div><h3>${escHtml(assignment.title)} — Review</h3><span style="font-size:13px;font-weight:700;color:${getGradeColor(sub.score)}">Score: ${sub.score}% (${getGradeLabel(sub.score)})</span></div>
          <div class="modal-close" onclick="UI.closeModal('reviewModal');document.getElementById('reviewModal').remove()"><i class="fas fa-times"></i></div>
        </div>
        <div class="modal-body">
          ${assignment.questions.map((q,qi)=>{
            const studentAns=sub.answers[qi];
            const isCorrect=studentAns===q.correctAnswer;
            return `<div style="margin-bottom:24px">
              <div style="font-weight:700;font-size:15px;margin-bottom:4px"><span style="color:var(--primary)">Q${qi+1}.</span> ${escHtml(q.text)}</div>
              <div style="font-size:12px;margin-bottom:10px;color:${isCorrect?'var(--success)':'var(--danger)'}"><i class="fas fa-${isCorrect?'check':'times'}-circle"></i> ${isCorrect?'Correct!':'Incorrect'}</div>
              ${q.options.map((opt,oi)=>{
                let cls=''; if(oi===q.correctAnswer) cls='correct'; else if(oi===studentAns&&!isCorrect) cls='wrong';
                return `<div class="mcq-option ${cls}" style="cursor:default;margin-bottom:8px">
                  <div class="mcq-letter">${['A','B','C','D'][oi]}</div>
                  <div class="mcq-text">${escHtml(opt)}${oi===q.correctAnswer?' <span style="font-size:11px;color:var(--success);font-weight:600">(Correct Answer)</span>':oi===studentAns&&!isCorrect?' <span style="font-size:11px;color:var(--danger);font-weight:600">(Your Answer)</span>':''}</div>
                </div>`;
              }).join('')}
            </div>`;
          }).join('')}
        </div>
        <div class="modal-footer"><button class="btn btn-primary" onclick="UI.closeModal('reviewModal');document.getElementById('reviewModal').remove()">Close</button></div>
      </div>
    </div>`;
    const existing=document.getElementById('reviewModal');
    if(existing) existing.remove();
    document.body.insertAdjacentHTML('beforeend',html);
    UI.openModal('reviewModal');
  },

  renderGrades(container){
    App.setTopbarTitle('My Grades','View all your grades and performance');
    const student=App.currentUser;
    const assignments=this.getMyAssignments();
    const subs=DB.getSubmissions().filter(s=>s.studentId===student.id);
    const avg=subs.length?Math.round(subs.reduce((a,b)=>a+b.score,0)/subs.length):null;
    container.innerHTML=`
      <div class="section-panel active">
        <div class="page-header">
          <div class="page-header-left"><h1>My Grades</h1><p>Section ${student.section}</p></div>
          ${avg!==null?`<div class="stat-card" style="--stat-color:${getGradeColor(avg)};--stat-bg:${getGradeColor(avg).replace(')',',0.1)')};padding:12px 20px;box-shadow:none">
            <div class="stat-icon" style="width:40px;height:40px"><i class="fas fa-star"></i></div>
            <div class="stat-info"><div class="val" style="font-size:22px">${avg}%</div><div class="lbl">Overall Average (${getGradeLabel(avg)})</div></div>
          </div>`:''}
        </div>
        <div class="grid-2" ź="margin-bottom:20px">
          <div class="card">
            <div class="card-header"><h3><i class="fas fa-chart-bar" style="color:var(--primary);margin-right:8px"></i>My Scores</h3></div>
            <div class="card-body"><div class="chart-container-lg"><canvas id="myScoresChart"></canvas></div></div>
          </div>
          <div class="card">
            <div class="card-header"><h3><i class="fas fa-chart-pie" style="color:var(--accent);margin-right:8px"></i>Grade Distribution</h3></div>
            <div class="card-body"><div class="chart-container-lg"><canvas id="myGradeDistChart"></canvas></div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3><i class="fas fa-list" style="color:var(--warning);margin-right:8px"></i>All Assignments</h3></div>
          <div class="card-body" style="padding:0">
            <div class="table-wrap"><table>
              <thead><tr><th>Assignment</th><th>Section</th><th>Questions</th><th>Score</th><th>Grade</th><th>Submitted</th><th>Actions</th></tr></thead>
              <tbody>
                ${assignments.map(a=>{ const sub=subs.find(s=>s.assignmentId===a.id); return `<tr>
                  <td style="font-weight:600">${escHtml(a.title)}</td>
                  <td><span class="badge badge-primary">§${a.section}</span></td>
                  <td>${a.questions.length} Q</td>
                  <td>${sub?`<span style="font-weight:700;color:${getGradeColor(sub.score)}">${sub.score}%</span>`:'<span class="badge badge-gray">Not submitted</span>'}</td>
                  <td>${sub?`<span class="badge" style="background:${getGradeColor(sub.score).replace(')',',0.15)')};color:${getGradeColor(sub.score)}">${getGradeLabel(sub.score)}</span>`:'—'}</td>
                  <td style="font-size:12px;color:var(--text3)">${sub?formatDateTime(sub.submittedAt):'—'}</td>
                  <td>${sub?`<button class="btn btn-sm btn-secondary" onclick="StudentDash.reviewAssignment('${a.id}')"><i class="fas fa-eye"></i> Review</button>`
                    :!isOverdue(a.deadline)?`<button class="btn btn-sm btn-primary" onclick="StudentDash.openTakeAssignment('${a.id}')"><i class="fas fa-pencil-alt"></i> Start</button>`
                    :'<span style="font-size:12px;color:var(--text3)">Expired</span>'}</td>
                </tr>`; }).join('')}
              </tbody>
            </table></div>
          </div>
        </div>
      </div>`;
    requestAnimationFrame(()=>{
      const submittedAssigns=[...assignments].filter(a=>subs.find(s=>s.assignmentId===a.id));
      const ctx1=document.getElementById('myScoresChart');
      if(ctx1&&submittedAssigns.length){
        const labels=submittedAssigns.map(a=>a.title.slice(0,12)+'...');
        const data=submittedAssigns.map(a=>{ const s=subs.find(b=>b.assignmentId===a.id); return s?s.score:0; });
        App.charts['myScoresChart']=new Chart(ctx1,{
          type:'bar',
          data:{labels,datasets:[{label:'Score %',data,backgroundColor:data.map(d=>`${getGradeColor(d).replace(')',',0.7)')}`),borderRadius:6,borderWidth:0}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,grid:{color:'rgba(128,128,128,0.1)'},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}
        });
      }
      const ctx2=document.getElementById('myGradeDistChart');
      if(ctx2){
        const grades=['A','B','C','D','F'];
        const counts=[
          subs.filter(s=>s.score>=90).length,
          subs.filter(s=>s.score>=80&&s.score<90).length,
          subs.filter(s=>s.score>=70&&s.score<80).length,
          subs.filter(s=>s.score>=60&&s.score<70).length,
          subs.filter(s=>s.score<60).length,
        ];
        App.charts['myGradeDistChart']=new Chart(ctx2,{
          type:'doughnut',
          data:{labels:grades,datasets:[{data:counts,backgroundColor:['rgba(34,197,94,0.8)','rgba(6,182,212,0.8)','rgba(245,158,11,0.8)','rgba(239,68,68,0.8)','rgba(100,116,139,0.8)'],borderWidth:0,hoverOffset:6}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:12,font:{size:12}}}}}
        });
      }
    });
  },

  renderAnnouncements(container){
    App.setTopbarTitle('Announcements','View announcements from your school and teachers');
    const student=App.currentUser;
    const anns=DB.getAnnouncements().filter(a=>!a.targetSection||a.targetSection===student.section).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    container.innerHTML=`
      <div class="section-panel active">
        <div class="page-header"><div class="page-header-left"><h1>Announcements</h1><p>School and section announcements</p></div></div>
        ${anns.length?anns.map(a=>AdminDash.renderAnnCard(a)).join(''):`<div class="empty-state"><i class="fas fa-bullhorn"></i><h3>No announcements</h3></div>`}
      </div>`;
  }
};

/* ============================================================
   SHARED PANELS
   ============================================================ */
function renderNotificationsPanel(container){
  App.setTopbarTitle('Notifications','Your notifications and reminders');
  const user=App.currentUser;
  const notifs=DB.getNotifForUser(user.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  // Mark all read
  const allNotifs=DB.getNotifications();
  allNotifs.filter(n=>n.userId===user.id).forEach(n=>n.read=true);
  DB.saveNotifications(allNotifs);
  UI.updateNotifBadge();

  const typeIcon={assignment:'fa-tasks',grade:'fa-star',announcement:'fa-bullhorn',reminder:'fa-bell',info:'fa-info-circle'};
  const typeColor={assignment:'var(--primary)',grade:'var(--warning)',announcement:'var(--accent)',reminder:'var(--success)',info:'var(--primary)'};

  container.innerHTML=`
    <div class="section-panel active">
      <div class="page-header">
        <div class="page-header-left"><h1>Notifications</h1><p>${notifs.length} total · ${notifs.filter(n=>!n.read).length} unread</p></div>
        ${notifs.length?`<button class="btn btn-secondary" onclick="clearNotifications()"><i class="fas fa-trash"></i> Clear All</button>`:''}
      </div>
      <div class="card">
        ${notifs.length?notifs.map(n=>`<div class="notif-item">
          <div class="notif-icon" style="background:${(typeColor[n.type]||typeColor.info).replace(')',',0.12)')};color:${typeColor[n.type]||typeColor.info}">
            <i class="fas ${typeIcon[n.type]||typeIcon.info}"></i>
          </div>
          <div class="notif-content">
            <div class="title">${escHtml(n.title)}</div>
            <div class="msg">${escHtml(n.message)}</div>
            <div class="time">${timeAgo(n.createdAt)}</div>
          </div>
        </div>`).join(''):`<div class="empty-state"><i class="fas fa-bell-slash"></i><h3>No notifications</h3><p>You're all caught up!</p></div>`}
      </div>
    </div>`;
}

function clearNotifications(){
  const notifs=DB.getNotifications().filter(n=>n.userId!==App.currentUser.id);
  DB.saveNotifications(notifs); UI.updateNotifBadge();
  App.showSection('notifications');
}

function renderProfilePanel(container){
  App.setTopbarTitle('My Profile','View and edit your profile information');
  const user=App.currentUser;
  container.innerHTML=`
    <div class="section-panel active">
      <div style="max-width:700px;margin:0 auto">
        <div class="profile-card">
          <div class="profile-banner"></div>
          <div class="profile-avatar-wrap">
            <div class="profile-avatar ${getAvatarColor(user.id)}">${getInitials(user.name)}</div>
          </div>
          <div class="profile-info">
            <h2>${escHtml(user.name)}</h2>
            <span class="role-badge ${user.role}" style="font-size:12px;padding:4px 10px">${user.role}</span>
            <div class="profile-info-grid">
              <div class="profile-field"><label>Username</label><span>@${escHtml(user.username)}</span></div>
              <div class="profile-field"><label>Email</label><span>${escHtml(user.email||'—')}</span></div>
              <div class="profile-field"><label>Phone</label><span>${escHtml(user.phone||'—')}</span></div>
              <div class="profile-field"><label>Section</label><span>${user.section||'—'}</span></div>
              ${user.role==='teacher'?`<div class="profile-field"><label>My Sections</label><span>${(user.sections||[]).join(', ')||'—'}</span></div>`:''}
              <div class="profile-field"><label>Member Since</label><span>${formatDate(user.createdAt)}</span></div>
            </div>
            <button class="btn btn-primary" style="margin-top:20px" onclick="openEditProfile()"><i class="fas fa-edit"></i> Edit Profile</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="editProfileModal">
      <div class="modal">
        <div class="modal-header"><h3>Edit Profile</h3><div class="modal-close" onclick="UI.closeModal('editProfileModal')"><i class="fas fa-times"></i></div></div>
        <div class="modal-body">
          <div class="field"><label>Full Name</label><input type="text" id="ep_name" value="${escHtml(user.name)}"></div>
          <div class="field"><label>Email</label><input type="email" id="ep_email" value="${escHtml(user.email||'')}"></div>
          <div class="field"><label>Phone</label><input type="text" id="ep_phone" value="${escHtml(user.phone||'')}"></div>
          <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
          <div class="field"><label>New Password (leave blank to keep current)</label><input type="password" id="ep_pw" placeholder="New password"></div>
          <div class="field"><label>Confirm New Password</label><input type="password" id="ep_pw2" placeholder="Confirm password"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="UI.closeModal('editProfileModal')">Cancel</button>
          <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save</button>
        </div>
      </div>
    </div>`;
}

function openEditProfile(){ UI.openModal('editProfileModal'); }

function saveProfile(){
  const name=document.getElementById('ep_name')?.value?.trim();
  const email=document.getElementById('ep_email')?.value?.trim();
  const phone=document.getElementById('ep_phone')?.value?.trim();
  const pw=document.getElementById('ep_pw')?.value;
  const pw2=document.getElementById('ep_pw2')?.value;
  if(!name){ UI.showToast('Error','Name is required','warning'); return; }
  if(pw && pw!==pw2){ UI.showToast('Error','Passwords do not match','danger'); return; }
  if(pw && pw.length<6){ UI.showToast('Error','Password must be at least 6 characters','warning'); return; }
  const users=DB.getUsers(); const idx=users.findIndex(u=>u.id===App.currentUser.id);
  if(idx===-1) return;
  users[idx].name=name; users[idx].email=email||''; users[idx].phone=phone||'';
  if(pw) users[idx].password=pw;
  DB.saveUsers(users); App.currentUser=users[idx]; DB.setCurrentUser(users[idx]);
  App.renderSidebar(users[idx]); App.renderTopbar(users[idx]);
  UI.closeModal('editProfileModal');
  UI.showToast('Saved','Profile updated successfully','success');
  App.showSection('profile');
}

/* ============================================================
   GLOBAL SEARCH
   ============================================================ */
function handleGlobalSearch(q){
  if(!q.trim() || App.currentUser.role!=='admin') return;
  AdminDash.accountsFilter.search=q;
  if(App.currentSection!=='accounts') App.showSection('accounts');
  else AdminDash.filterAccounts();
}

/* ============================================================
   AUTH HANDLERS
   ============================================================ */
function handleLogin(){
  const username=document.getElementById('loginUsername').value.trim();
  const password=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');
  if(!username||!password){ errEl.style.display='block'; errEl.innerHTML='<i class="fas fa-exclamation-circle"></i> Please enter username and password'; return; }
  const user=Auth.login(username,password);
  if(!user){ errEl.style.display='block'; errEl.innerHTML='<i class="fas fa-exclamation-circle"></i> Invalid username or password'; gsap.fromTo('#loginCard',{x:-8},{x:8,duration:0.07,repeat:5,yoyo:true,ease:'none',onComplete:()=>gsap.set('#loginCard',{x:0})}); return; }
  errEl.style.display='none';
  App.currentUser=user;
  gsap.to('#loginCard',{opacity:0,y:-20,duration:0.3,onComplete:()=>App.showDashboard(user)});
}

function handleLogout(){
  Swal.fire({title:'Sign Out?',text:'You will be logged out of EduCore.',icon:'question',showCancelButton:true,confirmButtonText:'Sign Out',confirmButtonColor:'#4f46e5'})
    .then(r=>{ if(r.isConfirmed){ Auth.logout(); App.destroyCharts(); gsap.to('#dashboard-screen',{opacity:0,duration:0.3,onComplete:()=>{ document.getElementById('dashboard-screen').style.display='none'; document.getElementById('loginUsername').value=''; document.getElementById('loginPassword').value=''; App.showLogin(); }}); }});
}

/* ============================================================
   MISC
   ============================================================ */
function togglePw(){
  const input=document.getElementById('loginPassword');
  const icon=document.getElementById('pwToggle');
  if(input.type==='password'){ input.type='text'; icon.className='fas fa-eye-slash form-input-toggle'; }
  else { input.type='password'; icon.className='fas fa-eye form-input-toggle'; }
}

function toggleTheme(){
  const el=document.documentElement; const toggle=document.getElementById('themeToggle');
  const isDark=el.getAttribute('data-theme')==='dark';
  el.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('ec_dark',isDark?'0':'1');
  if(toggle) toggle.classList.toggle('on',!isDark);
  // Re-render charts if any
  if(App.currentUser) App.showSection(App.currentSection||'overview');
}

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  if(sb.classList.contains('open')){ ov.style.display='block'; gsap.fromTo(ov,{opacity:0},{opacity:1,duration:0.2}); }
  else { gsap.to(ov,{opacity:0,duration:0.2,onComplete:()=>ov.style.display='none'}); }
}

function closeSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebarOverlay');
  sb.classList.remove('open');
  gsap.to(ov,{opacity:0,duration:0.2,onComplete:()=>ov.style.display='none'});
}

// Keyboard support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none') handleLogin();
  if(e.key==='Escape'){ document.querySelectorAll('.modal-overlay.open').forEach(m=>{ m.classList.remove('open'); }); closeSidebar(); }
});

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded',()=>App.init());
</script>
