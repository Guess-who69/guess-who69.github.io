<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCore — School Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* ============================================================
   CSS VARIABLES & THEME
   ============================================================ */
:root {
  --bg: #eef1f8;
  --bg2: #f7f8fc;
  --card: #ffffff;
  --sidebar: #0f172a;
  --sidebar-hover: #1e293b;
  --sidebar-active: #4f46e5;
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --primary-dark: #3730a3;
  --accent: #06b6d4;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --border: #e2e8f0;
  --border2: #cbd5e1;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --sidebar-w: 252px;
  --topbar-h: 64px;
  --font-display: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  --admin-color: #f59e0b;
  --teacher-color: #06b6d4;
  --student-color: #22c55e;
}

[data-theme="dark"] {
  --bg: #070c1a;
  --bg2: #0d1427;
  --card: #111827;
  --sidebar: #060b18;
  --sidebar-hover: #0d1427;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --border: #1e293b;
  --border2: #334155;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
a { color: inherit; text-decoration: none; }
ul { list-style: none; }
input, textarea, select, button { font-family: var(--font-body); }
img { max-width: 100%; display: block; }
h1,h2,h3,h4,h5 { font-family: var(--font-display); font-weight: 700; }
button { cursor: pointer; border: none; outline: none; }

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  z-index: 1000;
  overflow: hidden;
}
.login-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0f172a 100%);
  overflow: hidden;
}
.login-bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  animation: orbFloat 8s ease-in-out infinite alternate;
}
.login-bg-orb:nth-child(1) { width:500px;height:500px;background:#4f46e5;top:-100px;right:-100px;animation-delay:0s; }
.login-bg-orb:nth-child(2) { width:350px;height:350px;background:#06b6d4;bottom:-80px;left:-60px;animation-delay:3s; }
.login-bg-orb:nth-child(3) { width:250px;height:250px;background:#a855f7;top:40%;left:40%;animation-delay:1.5s; }
@keyframes orbFloat { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,20px) scale(1.08)} }

.login-grid {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.login-card {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 24px;
  padding: 48px 44px;
  width: 420px;
  max-width: calc(100vw - 32px);
  box-shadow: 0 32px 80px rgba(0,0,0,0.4);
}
.login-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 36px;
}
.login-logo-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: white;
}
.login-logo-text { color: white; }
.login-logo-text h1 { font-size: 22px; line-height: 1; }
.login-logo-text span { font-size: 11px; color: rgba(255,255,255,0.5); font-family: var(--font-body); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; }
.login-title { color: white; font-size: 26px; margin-bottom: 6px; }
.login-sub { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 32px; font-weight: 400; }

.form-group { margin-bottom: 18px; }
.form-label { display: block; color: rgba(255,255,255,0.65); font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
.form-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 12px 16px;
  color: white;
  font-size: 14px;
  transition: var(--transition);
}
.form-input::placeholder { color: rgba(255,255,255,0.3); }
.form-input:focus { outline: none; border-color: #4f46e5; background: rgba(79,70,229,0.1); box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
.form-input-wrap { position: relative; }
.form-input-wrap .form-input { padding-right: 44px; }
.form-input-toggle {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.4); cursor: pointer; font-size: 15px;
  transition: color 0.2s;
}
.form-input-toggle:hover { color: rgba(255,255,255,0.7); }

.login-btn {
  width: 100%;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-weight: 600;
  margin-top: 8px;
  box-shadow: 0 4px 20px rgba(79,70,229,0.4);
  transition: var(--transition);
  position: relative; overflow: hidden;
}
.login-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.2s;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,70,229,0.5); }
.login-btn:hover::after { opacity: 0.06; }
.login-btn:active { transform: translateY(0); }
.login-btn i { margin-right: 8px; }

.login-error {
  color: #fca5a5;
  font-size: 12.5px;
  margin-top: 12px;
  text-align: center;
  display: none;
}

.login-footer {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.3);
  font-size: 11.5px;
  text-align: center;
}

/* ============================================================
   DASHBOARD SCREEN
   ============================================================ */
#dashboard-screen {
  display: none;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed; top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--sidebar);
  display: flex; flex-direction: column;
  z-index: 200;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
.sidebar-logo {
  padding: 22px 20px 18px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.sidebar-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: white; flex-shrink: 0;
}
.sidebar-logo-text h2 { color: white; font-size: 17px; }
.sidebar-logo-text span { color: rgba(255,255,255,0.35); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-body); }

.sidebar-user {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.sidebar-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: white; font-weight: 600; flex-shrink: 0;
}
.sidebar-user-info .name { color: white; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.sidebar-user-info .role-badge {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 99px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.role-badge.admin { background: rgba(245,158,11,0.2); color: #fbbf24; }
.role-badge.teacher { background: rgba(6,182,212,0.2); color: #22d3ee; }
.role-badge.student { background: rgba(34,197,94,0.2); color: #4ade80; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 10px; }
.nav-section-label { color: rgba(255,255,255,0.25); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 10px 6px; font-weight: 600; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 9px;
  color: rgba(255,255,255,0.55);
  font-size: 13.5px; font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 2px;
  position: relative;
}
.nav-item i { width: 18px; text-align: center; font-size: 14px; }
.nav-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.85); }
.nav-item.active { background: var(--sidebar-active); color: white; }
.nav-item .nav-badge {
  margin-left: auto;
  background: var(--danger);
  color: white;
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 99px;
  min-width: 18px; text-align: center;
  animation: badgePulse 2s ease infinite;
}
@keyframes badgePulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column; gap: 4px;
}
.sidebar-footer .nav-item { margin-bottom: 0; }

/* ── MAIN CONTENT ── */
.main-wrap {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  display: flex; flex-direction: column;
  transition: margin 0.3s;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--border);
}
.topbar-hamburger {
  display: none;
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  align-items: center; justify-content: center;
  font-size: 15px; color: var(--text2);
  cursor: pointer; transition: var(--transition);
  flex-shrink: 0;
}
.topbar-hamburger:hover { background: var(--border); color: var(--text); }
.topbar-title {
  flex: 1;
  display: flex; flex-direction: column;
}
.topbar-title h2 { font-size: 18px; color: var(--text); line-height: 1.1; }
.topbar-title span { font-size: 11.5px; color: var(--text3); font-family: var(--font-body); font-weight: 400; }

.topbar-actions { display: flex; align-items: center; gap: 10px; }

.topbar-search {
  display: flex; align-items: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  gap: 8px;
  width: 220px;
  transition: var(--transition);
}
.topbar-search:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.topbar-search i { color: var(--text3); font-size: 13px; }
.topbar-search input {
  background: none; border: none; outline: none;
  font-size: 13px; color: var(--text);
  width: 100%;
}
.topbar-search input::placeholder { color: var(--text3); }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 9px;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--text2);
  cursor: pointer; transition: var(--transition);
  position: relative;
}
.icon-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
.icon-btn .badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--danger);
  color: white; font-size: 9px; font-weight: 700;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--card);
  animation: badgePulse 2s ease infinite;
}

.topbar-user {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 4px 8px; border-radius: 9px;
  transition: var(--transition);
}
.topbar-user:hover { background: var(--bg); }
.topbar-user .avatar {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 700;
}
.topbar-user .uname { font-size: 13px; font-weight: 600; color: var(--text); }
.topbar-user .urole { font-size: 11px; color: var(--text3); text-transform: capitalize; }

/* ── CONTENT AREA ── */
.content-area {
  flex: 1;
  padding: 28px;
  overflow-x: hidden;
}

/* ── SECTION PANEL ── */
.section-panel { display: none; animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
.section-panel.active { display: block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ============================================================
   COMMON COMPONENTS
   ============================================================ */

/* Page Header */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.page-header-left h1 { font-size: 24px; color: var(--text); margin-bottom: 4px; }
.page-header-left p { font-size: 13px; color: var(--text2); font-weight: 400; }
.page-header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 16px;
  transition: var(--transition);
  cursor: default;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--stat-color, var(--primary));
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.stat-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--stat-bg, rgba(79,70,229,0.1));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: var(--stat-color, var(--primary));
  flex-shrink: 0;
}
.stat-info .val { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; font-family: var(--font-display); }
.stat-info .lbl { font-size: 12px; color: var(--text2); font-weight: 500; }
.stat-info .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-header h3 { font-size: 15px; color: var(--text); }
.card-body { padding: 20px; }
.card-footer { padding: 14px 20px; border-top: 1px solid var(--border); }

/* Grid Layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  font-size: 13.5px;
}
thead th {
  text-align: left;
  padding: 10px 14px;
  background: var(--bg);
  color: var(--text2);
  font-size: 11.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 11px 14px; color: var(--text); vertical-align: middle; }

/* Badges / Pills */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 99px;
  font-size: 11.5px; font-weight: 600;
}
.badge-primary { background: rgba(79,70,229,0.12); color: #4f46e5; }
.badge-success { background: rgba(34,197,94,0.12); color: #16a34a; }
.badge-warning { background: rgba(245,158,11,0.12); color: #d97706; }
.badge-danger  { background: rgba(239,68,68,0.12); color: #dc2626; }
.badge-info    { background: rgba(6,182,212,0.12); color: #0891b2; }
.badge-gray    { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border-radius: 9px;
  font-size: 13px; font-weight: 600;
  transition: var(--transition);
  white-space: nowrap;
}
.btn i { font-size: 12px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-warning { background: var(--warning); color: white; }
.btn-sm { padding: 6px 11px; font-size: 12px; border-radius: 7px; }
.btn-icon { padding: 8px; border-radius: 8px; }
.btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
.btn-outline:hover { background: var(--primary); color: white; }

/* Search / Filter Bar */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.filter-bar .search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 14px;
  flex: 1; min-width: 200px;
  transition: var(--transition);
}
.filter-bar .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.filter-bar .search-box i { color: var(--text3); font-size: 13px; }
.filter-bar .search-box input { background: none; border: none; outline: none; font-size: 13px; color: var(--text); width: 100%; }
.filter-bar .search-box input::placeholder { color: var(--text3); }

select.filter-select {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 32px 9px 12px;
  font-size: 13px; color: var(--text);
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 16px;
  transition: var(--transition);
}
select.filter-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

/* Modal Overlay */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%; max-width: 600px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: scale(0.95) translateY(8px);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-lg { max-width: 800px; }
.modal-xl { max-width: 1000px; }
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.modal-header h3 { font-size: 17px; color: var(--text); }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 7px; background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text2);
  cursor: pointer; transition: var(--transition);
}
.modal-close:hover { background: var(--danger); color: white; border-color: var(--danger); }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* Form Styles */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-row.single { grid-template-columns: 1fr; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  font-size: 13.5px; color: var(--text);
  transition: var(--transition);
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
  background: var(--card);
}
.field textarea { resize: vertical; min-height: 80px; }
.field select { appearance: none; cursor: pointer; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 16px; padding-right: 36px; }

/* Notification Toast */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 9999; display: flex; flex-direction: column; gap: 10px;
  align-items: flex-end;
}
.toast {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-lg);
  min-width: 280px; max-width: 360px;
  animation: toastIn 0.35s cubic-bezier(0.4,0,0.2,1) forwards;
  position: relative; overflow: hidden;
}
.toast::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--toast-color, var(--primary));
}
@keyframes toastIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut { to{opacity:0;transform:translateX(24px)} }
.toast-icon { font-size: 18px; color: var(--toast-color, var(--primary)); flex-shrink: 0; }
.toast-content .title { font-size: 13px; font-weight: 600; color: var(--text); }
.toast-content .msg { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Charts */
.chart-container { position: relative; height: 220px; }
.chart-container-lg { height: 300px; }

/* Assignment Cards */
.assignment-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  transition: var(--transition);
  cursor: pointer;
  position: relative; overflow: hidden;
}
.assignment-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--ac, var(--primary));
  transition: width 0.2s;
}
.assignment-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.assignment-card:hover::before { width: 6px; }
.assignment-card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; font-family: var(--font-display); }
.assignment-card-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 8px; }
.assignment-card-meta span { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.assignment-card-meta span i { font-size: 11px; }
.assignment-card-desc { font-size: 13px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Progress Bar */
.progress-bar { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: var(--primary); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

/* MCQ Options */
.mcq-option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 10px;
}
.mcq-option:hover { border-color: var(--primary); background: rgba(79,70,229,0.04); }
.mcq-option.selected { border-color: var(--primary); background: rgba(79,70,229,0.08); }
.mcq-option.correct { border-color: var(--success); background: rgba(34,197,94,0.08); }
.mcq-option.wrong { border-color: var(--danger); background: rgba(239,68,68,0.08); }
.mcq-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  transition: var(--transition);
}
.mcq-option.selected .mcq-letter { background: var(--primary); border-color: var(--primary); color: white; }
.mcq-option.correct .mcq-letter { background: var(--success); border-color: var(--success); color: white; }
.mcq-option.wrong .mcq-letter { background: var(--danger); border-color: var(--danger); color: white; }
.mcq-text { font-size: 13.5px; color: var(--text); flex: 1; }

/* Avatar Colors */
.av-purple { background: linear-gradient(135deg,#7c3aed,#a855f7); }
.av-blue   { background: linear-gradient(135deg,#2563eb,#60a5fa); }
.av-green  { background: linear-gradient(135deg,#059669,#34d399); }
.av-orange { background: linear-gradient(135deg,#d97706,#fbbf24); }
.av-pink   { background: linear-gradient(135deg,#db2777,#f472b6); }
.av-indigo { background: linear-gradient(135deg,#4f46e5,#818cf8); }

/* Empty State */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center; color: var(--text3);
}
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 8px; }
.empty-state p { font-size: 13px; max-width: 280px; }

/* Section Cards (1201-1216) */
.section-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 14px; }
.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.section-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
.section-card .num { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--primary); }
.section-card .lbl { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.section-card .count { font-size: 12px; color: var(--text2); margin-top: 8px; }

/* Announcement Card */
.announcement-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  transition: var(--transition);
}
.announcement-card:hover { box-shadow: var(--shadow-lg); }
.announcement-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.announcement-card-title { font-size: 14.5px; font-weight: 700; color: var(--text); }
.announcement-card-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
.announcement-card-meta span { font-size: 11.5px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.announcement-card-body { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* Notification Item */
.notif-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  cursor: pointer;
}
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: var(--bg); }
.notif-item.unread { background: rgba(79,70,229,0.04); }
.notif-icon {
  width: 36px; height: 36px;
  border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.notif-content .title { font-size: 13px; font-weight: 600; color: var(--text); }
.notif-content .msg { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.notif-content .time { font-size: 11px; color: var(--text3); margin-top: 4px; }
.notif-dot {
  width: 8px; height: 8px;
  background: var(--primary); border-radius: 50%;
  margin-top: 4px; flex-shrink: 0;
}

/* Dark Mode Toggle */
.theme-toggle {
  width: 44px; height: 24px;
  background: var(--text3);
  border-radius: 99px;
  position: relative; cursor: pointer;
  transition: background 0.3s;
  flex-shrink: 0;
}
.theme-toggle.on { background: var(--primary); }
.theme-toggle::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: white; border-radius: 50%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.theme-toggle.on::after { transform: translateX(20px); }

/* Question Builder */
.question-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
  position: relative;
}
.question-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.question-block-header span { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
.option-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.option-letter {
  width: 28px; height: 28px; flex-shrink: 0;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--text2);
}
.option-row input { flex: 1; }
.correct-radio {
  width: 18px; height: 18px; flex-shrink: 0;
  accent-color: var(--success); cursor: pointer;
}
.correct-label { font-size: 11px; color: var(--text3); }

/* Profile Card */
.profile-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.profile-banner {
  height: 100px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  position: relative;
}
.profile-avatar-wrap {
  position: absolute; bottom: -28px; left: 24px;
  width: 64px; height: 64px;
  background: var(--card);
  border-radius: 50%;
  padding: 4px;
}
.profile-avatar {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: white;
}
.profile-info { padding: 44px 24px 24px; }
.profile-info h2 { font-size: 20px; color: var(--text); margin-bottom: 4px; }
.profile-info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-top: 18px;
}
.profile-field { }
.profile-field label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 3px; }
.profile-field span { font-size: 14px; color: var(--text); font-weight: 500; }

/* Sidebar overlay (mobile) */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1024px) {
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: block; }
  .main-wrap { margin-left: 0; }
  .topbar-hamburger { display: flex; }
  .topbar-search { display: none; }
  .content-area { padding: 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; }
  .profile-info-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .login-card { padding: 32px 24px; }
  .modal-body { padding: 16px; }
}

/* Loading Spinner */
.spinner {
  width: 22px; height: 22px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Score Result */
.score-display {
  text-align: center; padding: 40px 20px;
}
.score-circle {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: conic-gradient(var(--primary) calc(var(--pct)*1%), var(--border) 0%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  box-shadow: var(--shadow);
}
.score-inner {
  width: 92px; height: 92px;
  border-radius: 50%;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.score-inner .pct { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--text); }
.score-inner .lbl { font-size: 10px; color: var(--text3); }
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Sidebar Overlay (mobile) -->

<!-- ============================================================
     LOGIN SCREEN
     ============================================================ -->

<script>
/* ============================================================
   CONSTANTS
   ============================================================ */
const SECTIONS = Array.from({length:16}, (_,i) => String(1201+i));
const ROLES = ['admin','teacher','student'];
const AV_COLORS = ['av-indigo','av-blue','av-green','av-orange','av-pink','av-purple'];

/* ============================================================
   DATA MANAGER  — localStorage persistence
   ============================================================ */
const DB = {
  _get(k){ try{return JSON.parse(localStorage.getItem(k))||null}catch{return null} },
  _set(k,v){ localStorage.setItem(k, JSON.stringify(v)) },

  getUsers(){ return this._get('ec_users') || [] },
  saveUsers(u){ this._set('ec_users',u) },
  getUserById(id){ return this.getUsers().find(u=>u.id===id)||null },
  getUserByUsername(uname){ return this.getUsers().find(u=>u.username.toLowerCase()===uname.toLowerCase())||null },

  getAssignments(){ return this._get('ec_assignments') || [] },
  saveAssignments(a){ this._set('ec_assignments',a) },
  getAssignmentById(id){ return this.getAssignments().find(a=>a.id===id)||null },

  getSubmissions(){ return this._get('ec_submissions') || [] },
  saveSubmissions(s){ this._set('ec_submissions',s) },
  getSubmissionByStudentAndAssignment(sid,aid){ return this.getSubmissions().find(s=>s.studentId===sid&&s.assignmentId===aid)||null },

  getAnnouncements(){ return this._get('ec_announcements') || [] },
  saveAnnouncements(a){ this._set('ec_announcements',a) },

  getNotifications(){ return this._get('ec_notifications') || [] },
  saveNotifications(n){ this._set('ec_notifications',n) },
  getNotifForUser(uid){ return this.getNotifications().filter(n=>n.userId===uid) },

  getCurrentUser(){ return this._get('ec_current_user') },
  setCurrentUser(u){ this._set('ec_current_user',u) },
  clearCurrentUser(){ localStorage.removeItem('ec_current_user') },

  uid(){ return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6) },

  // Add notification for a user
  addNotification(userId, title, message, type='info', relatedId=null){
    const notifs = this.getNotifications();
    notifs.unshift({ id:this.uid(), userId, title, message, type, relatedId, read:false, createdAt: new Date().toISOString() });
    this.saveNotifications(notifs);
    if(App.currentUser && App.currentUser.id === userId) UI.updateNotifBadge();
  },

  // Notify all students in a section
  notifySection(section, title, message, type='info', relatedId=null){
    const students = this.getUsers().filter(u=>u.role==='student'&&u.section===section);
    students.forEach(s=>this.addNotification(s.id, title, message, type, relatedId));
  }
};

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */
function getInitials(name){
  if(!name) return '?';
  return name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}
function getAvatarColor(id){
  const hash = (id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  return AV_COLORS[hash % AV_COLORS.length];
}
function formatDate(iso){
  if(!iso) return 'N/A';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function formatDateTime(iso){
  if(!iso) return 'N/A';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  if(diff<60000) return 'just now';
  if(diff<3600000) return Math.floor(diff/60000)+'m ago';
  if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
  return Math.floor(diff/86400000)+'d ago';
}
function isDeadlineSoon(iso){
  if(!iso) return false;
  const diff = new Date(iso).getTime() - Date.now();
  return diff > 0 && diff < 3*24*60*60*1000; // within 3 days
}
function isOverdue(iso){
  if(!iso) return false;
  return new Date(iso).getTime() < Date.now();
}
function getGradeColor(pct){
  if(pct>=90) return 'var(--success)';
  if(pct>=75) return 'var(--primary)';
  if(pct>=60) return 'var(--warning)';
  return 'var(--danger)';
}
function getGradeLabel(pct){
  if(pct>=90) return 'A';
  if(pct>=80) return 'B';
  if(pct>=70) return 'C';
  if(pct>=60) return 'D';
  return 'F';
}
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ============================================================
   UI HELPERS
   ============================================================ */
const UI = {
  showToast(title, msg, type='success'){
    const colors = { success:'var(--success)', danger:'var(--danger)', warning:'var(--warning)', info:'var(--primary)' };
    const icons = { success:'fa-check-circle', danger:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
    const el = document.createElement('div');
    el.className = 'toast';
    el.style.setProperty('--toast-color', colors[type]||colors.info);
    el.innerHTML = `<i class="fas ${icons[type]||icons.info} toast-icon"></i>
      <div class="toast-content"><div class="title">${escHtml(title)}</div><div class="msg">${escHtml(msg)}</div></div>`;
    const container = document.getElementById('toastContainer');
    container.appendChild(el);
    setTimeout(()=>{ el.style.animation='toastOut 0.3s forwards'; setTimeout(()=>el.remove(),300); }, 3500);
  },

  updateNotifBadge(){
    if(!App.currentUser) return;
    const unread = DB.getNotifForUser(App.currentUser.id).filter(n=>!n.read).length;
    const badge = document.getElementById('notifBadge');
    const navBadge = document.querySelector('.nav-badge[data-for="notifications"]');
    if(badge){ badge.textContent=unread; badge.style.display=unread?'flex':'none'; }
    if(navBadge){ navBadge.textContent=unread; navBadge.style.display=unread?'flex':'none'; }
  },

  openModal(id){ const m=document.getElementById(id); if(m){ m.classList.add('open'); } },
  closeModal(id){ const m=document.getElementById(id); if(m){ m.classList.remove('open'); } },

  renderAvatar(name, id, size=32, extraClass=''){
    const initials = getInitials(name);
    const color = getAvatarColor(id);
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:${Math.round(size*0.38)}px;font-weight:700;flex-shrink:0" class="${color} ${extraClass}">${initials}</div>`;
  }
};

  renderAccountsTable(){
    const tbody = document.getElementById('accountsTable');

    let users = DB.getUsers();
    const {search, role, section} = this.accountsFilter;
    if(search){ const q=search.toLowerCase(); users=users.filter(u=>u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)); }
    if(role!=='all') users=users.filter(u=>u.role===role);
    if(section!=='all') users=users.filter(u=>u.section===section);
    if(!users.length){ tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><i class="fas fa-search"></i><h3>No accounts found</h3><p>Try adjusting your search or filters</p></div></td></tr>`; return; }

        </div>

  openAnnouncementModal(){ UI.openModal('annModal'); },

  saveAnnouncement(){
    const title = document.getElementById('annTitle')?.value?.trim();
    const content = document.getElementById('annContent')?.value?.trim();
    const targetSection = document.getElementById('annSection')?.value||null;
    const type = document.getElementById('annType')?.value||'announcement';

    const ann = { id:DB.uid(), title, content, authorId:App.currentUser.id, authorName:App.currentUser.name, authorRole:App.currentUser.role, targetSection:targetSection||null, createdAt:new Date().toISOString(), type };
    const anns = DB.getAnnouncements(); anns.unshift(ann); DB.saveAnnouncements(anns);
    // Notify affected students
    const students = DB.getUsers().filter(u=>u.role==='student'&&(!targetSection||u.section===targetSection));
    students.forEach(s=>DB.addNotification(s.id,title,'New '+type+': '+content.slice(0,60)+'...',type));

  saveNewUser(){
    const name=document.getElementById('cf_name')?.value?.trim();
    const username=document.getElementById('cf_username')?.value?.trim();
    const password=document.getElementById('cf_password')?.value;
    const email=document.getElementById('cf_email')?.value?.trim();
    const phone=document.getElementById('cf_phone')?.value?.trim();
    const role=document.getElementById('cf_role')?.value||'student';
    const section=document.getElementById('cf_section')?.value||null;
    const sections=[...document.querySelectorAll('.sections-cb:checked')].map(c=>c.value);

    if(!name||!username||!password){ UI.showToast('Missing Fields','Name, username, and password are required','warning'); return; }
    if(DB.getUserByUsername(username)){ UI.showToast('Username Taken','This username is already in use','danger'); return; }
    if(password.length<6){ UI.showToast('Weak Password','Password must be at least 6 characters','warning'); return; }

    const newUser = { id:DB.uid(), username, password, role, name, email:email||'', phone:phone||'', section:section||null, sections: role==='teacher'?(section?[section,...sections.filter(s=>s!==section)]:sections):[], avatar:null, createdAt:new Date().toISOString(), isActive:true };
    const users = DB.getUsers(); users.push(newUser); DB.saveUsers(users);
    UI.closeModal('createUserModal');
    UI.showToast('Account Created',`${name}'s account has been created successfully`,'success');
    App.showSection('accounts');
  },

  openEditUserModal(userId){
    const user = DB.getUserById(userId);
    if(!user){ UI.showToast('Error','User not found','danger'); return; }
    const html = `<div class="modal-overlay" id="editUserModal">
      <div class="modal modal-lg">
        <div class="modal-header"><h3>Edit Account — ${escHtml(user.name)}</h3><div class="modal-close" onclick="UI.closeModal('editUserModal')"><i class="fas fa-times"></i></div></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="field"><label>Full Name *</label><input type="text" id="ef_name" value="${escHtml(user.name)}" placeholder="Full name"></div>
            <div class="field"><label>Username *</label><input type="text" id="ef_username" value="${escHtml(user.username)}" placeholder="Username"></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Email</label><input type="email" id="ef_email" value="${escHtml(user.email||'')}" placeholder="Email"></div>
            <div class="field"><label>Phone</label><input type="text" id="ef_phone" value="${escHtml(user.phone||'')}" placeholder="Phone"></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Role</label><select id="ef_role">${ROLES.map(r=>`<option value="${r}" ${user.role===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}</select></div>
            <div class="field"><label>Primary Section</label><select id="ef_section"><option value="">No Section</option>${SECTIONS.map(s=>`<option value="${s}" ${user.section===s?'selected':''}>${s}</option>`).join('')}</select></div>
          </div>
          <div class="field"><label>Additional Sections</label><div id="ef_sections_checkboxes" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">${SECTIONS.map(s=>`<label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;"><input type="checkbox" value="${s}" class="sections-cb-e" ${(user.sections||[]).includes(s)?'checked':''}> ${s}</label>`).join('')}</div></div>
          <div class="field"><label>Status</label><select id="ef_active"><option value="1" ${user.isActive?'selected':''}>Active</option><option value="0" ${!user.isActive?'selected':''}>Inactive</option></select></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="UI.closeModal('editUserModal')">Cancel</button>
          <button class="btn btn-primary" onclick="AdminDash.saveEditUser('${userId}')"><i class="fas fa-save"></i> Save Changes</button>
        </div>
      </div>
    </div>`;
    const existing = document.getElementById('editUserModal');
    if(existing) existing.remove();
    document.body.insertAdjacentHTML('beforeend', html);
    UI.openModal('editUserModal');
  },

  saveEditUser(userId){
    const name=document.getElementById('ef_name')?.value?.trim();
    const username=document.getElementById('ef_username')?.value?.trim();
    const email=document.getElementById('ef_email')?.value?.trim();
    const phone=document.getElementById('ef_phone')?.value?.trim();
    const role=document.getElementById('ef_role')?.value;
    const section=document.getElementById('ef_section')?.value||null;
    const sections=[...document.querySelectorAll('.sections-cb-e:checked')].map(c=>c.value);
    const isActive=document.getElementById('ef_active')?.value==='1';

    if(!name||!username){ UI.showToast('Missing Fields','Name and username are required','warning'); return; }
    const existing = DB.getUserByUsername(username);
    if(existing && existing.id !== userId){ UI.showToast('Username Taken','This username is already used by another account','danger'); return; }

    const users = DB.getUsers();
    const idx = users.findIndex(u=>u.id===userId);
    if(idx===-1){ UI.showToast('Error','User not found','danger'); return; }
    users[idx] = { ...users[idx], name, username, email:email||'', phone:phone||'', role, section:section||null, sections: role==='teacher'?(section?[section,...sections.filter(s=>s!==section)]:sections):[], isActive };
    DB.saveUsers(users);
    // Update current user if editing self
    if(userId===App.currentUser.id){ App.currentUser=users[idx]; DB.setCurrentUser(users[idx]); App.renderSidebar(users[idx]); App.renderTopbar(users[idx]); }
    UI.closeModal('editUserModal');
    UI.showToast('Saved','Account updated successfully','success');
    App.showSection('accounts');
  },

  openResetPasswordModal(userId){
    const user=DB.getUserById(userId);
    if(!user) return;
    Swal.fire({
      title:'Reset Password',
      html:`<div style="text-align:left"><p style="margin-bottom:10px;font-size:13px">Set new password for <strong>${escHtml(user.name)}</strong></p><input id="swal_pw" class="swal2-input" type="password" placeholder="New password (min 6 chars)"></div>`,
      showCancelButton:true, confirmButtonText:'Reset', confirmButtonColor:'#4f46e5',
      preConfirm:()=>{ const pw=document.getElementById('swal_pw').value; if(pw.length<6){ Swal.showValidationMessage('Password must be at least 6 characters'); return false; } return pw; }
    }).then(r=>{ if(r.isConfirmed){ const users=DB.getUsers(); const idx=users.findIndex(u=>u.id===userId); if(idx>-1){ users[idx].password=r.value; DB.saveUsers(users); UI.showToast('Password Reset',`Password for ${user.name} has been updated`,'success'); } } });
  },

  deleteUser(userId){
    if(userId===App.currentUser.id){ UI.showToast('Error','You cannot delete your own account','danger'); return; }
    const user=DB.getUserById(userId);
    if(!user) return;
    Swal.fire({ title:'Delete Account?', html:`Delete <strong>${escHtml(user.name)}</strong>'s account? This cannot be undone.`, icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Delete' })
      .then(r=>{ if(r.isConfirmed){ const users=DB.getUsers().filter(u=>u.id!==userId); DB.saveUsers(users); UI.showToast('Deleted',`${user.name}'s account has been deleted`,'success'); App.showSection('accounts'); } });
  }
};

/* ============================================================
   TEACHER DASHBOARD
   ============================================================ */
const TeacherDash = {
  render(section, container){
    const panels = {
      'overview': ()=>this.renderOverview(container),
      'students': ()=>this.renderStudents(container),
      'assignments': ()=>this.renderAssignments(container),
      'progress': ()=>this.renderProgress(container),
      'announcements': ()=>this.renderAnnouncements(container),
      'notifications': ()=>renderNotificationsPanel(container),
      'profile': ()=>renderProfilePanel(container),
    };
    (panels[section]||panels['overview'])();
  },

  getMyStudents(){
    const teacher = App.currentUser;
    const mySections = teacher.sections||[teacher.section].filter(Boolean);
    return DB.getUsers().filter(u=>u.role==='student'&&mySections.includes(u.section));
  },

  getMyAssignments(){
    return DB.getAssignments().filter(a=>a.teacherId===App.currentUser.id);
  },

  renderOverview(container){
    App.setTopbarTitle('Dashboard','Welcome, '+App.currentUser.name.split(' ')[0]);
    const teacher = App.currentUser;
    const mySections = teacher.sections||[teacher.section].filter(Boolean);
    const students = this.getMyStudents();
    const assignments = this.getMyAssignments();
    const subs = DB.getSubmissions().filter(s=>assignments.map(a=>a.id).includes(s.assignmentId));
    const pending = assignments.filter(a=>{ const submitted=subs.filter(s=>s.assignmentId===a.id).length; return submitted < students.length; }).length;

    container.innerHTML=`
      <div class="section-panel active">
        <div class="page-header">

  filterStudents(){
    const q=(document.getElementById('stuSearch')?.value||'').toLowerCase();
    const sec=document.getElementById('stuSection')?.value||'all';
    const teacher=App.currentUser;
    const mySections=teacher.sections||[teacher.section].filter(Boolean);
    let students=DB.getUsers().filter(u=>u.role==='student'&&mySections.includes(u.section));
    if(q) students=students.filter(u=>u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q));
    if(sec!=='all') students=students.filter(u=>u.section===sec);
    this.renderStudentsTable(students, this.getMyAssignments(), DB.getSubmissions());
  },

  renderStudentsTable(students, assignments, subs){
    const tbody=document.getElementById('teacherStudentsTable');

      const myAssign=assignments.filter(a=>a.section===s.section);
      const avg=mySubs.length?Math.round(mySubs.reduce((a,b)=>a+b.score,0)/mySubs.length):null;
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px">${UI.renderAvatar(s.name,s.id,32)}<div><div style="font-weight:600">${escHtml(s.name)}</div><div style="font-size:11.5px;color:var(--text3)">@${escHtml(s.username)}</div></div></div></td>

    const teacher=App.currentUser;
    const mySections=teacher.sections||[teacher.section].filter(Boolean);
    const html=`<div class="modal-overlay" id="createAssignModal">
      <div class="modal modal-xl">
        <div class="modal-header"><h3><i class="fas fa-tasks" style="color:var(--primary);margin-right:8px"></i>Create Assignment</h3><div class="modal-close" onclick="UI.closeModal('createAssignModal')"><i class="fas fa-times"></i></div></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="field"><label>Assignment Title *</label><input type="text" id="as_title" placeholder="e.g. Chapter 3 Quiz"></div>
            <div class="field"><label>Target Section *</label><select id="as_section"><option value="">Select section</option>${mySections.map(s=>`<option value="${s}">Section ${s}</option>`).join('')}</select></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Description (optional)</label><textarea id="as_desc" placeholder="Instructions or description..."></textarea></div>
            <div class="field"><label>Deadline (optional)</label><input type="datetime-local" id="as_deadline"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px">
            <h4 style="font-size:14px;color:var(--text)"><i class="fas fa-question-circle" style="color:var(--primary);margin-right:8px"></i>Questions</h4>
            <button class="btn btn-sm btn-primary" onclick="TeacherDash.addQuestion()"><i class="fas fa-plus"></i> Add Question</button>
          </div>
          <div id="questionsContainer"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="UI.closeModal('createAssignModal')">Cancel</button>
          <button class="btn btn-primary" onclick="TeacherDash.saveAssignment()"><i class="fas fa-save"></i> Save Assignment</button>
        </div>
      </div>
    </div>`;
    const existing=document.getElementById('createAssignModal');
    if(existing) existing.remove();
    document.body.insertAdjacentHTML('beforeend',html);
    UI.openModal('createAssignModal');
    this._qCount=0;
    this.addQuestion(); // Add first question by default
  },

  _qCount:0,

  addQuestion(){
    const qid=`q_${++this._qCount}`;
    const container=document.getElementById('questionsContainer');
    if(!container) return;
    const letters=['A','B','C','D'];
    const qHtml=`<div class="question-block" id="qblock_${qid}">
      <div class="question-block-header">
        <span>Question ${this._qCount}</span>
        <button class="btn btn-sm btn-danger btn-icon" onclick="document.getElementById('qblock_${qid}').remove()"><i class="fas fa-times"></i></button>
      </div>
      <div class="field"><label>Question Text *</label><input type="text" id="${qid}_text" placeholder="Enter your question here..."></div>
      ${letters.map((l,i)=>`<div class="option-row">
        <div class="option-letter">${l}</div>
        <input type="text" class="field" style="flex:1;margin:0;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);font-size:13px" id="${qid}_opt${i}" placeholder="Option ${l}...">
        <input type="radio" class="correct-radio" name="${qid}_correct" value="${i}" id="${qid}_cor${i}">
        <label class="correct-label" for="${qid}_cor${i}">Correct</label>
      </div>`).join('')}
    </div>`;
    container.insertAdjacentHTML('beforeend', qHtml);
  },

  saveAssignment(){
    const title=document.getElementById('as_title')?.value?.trim();
    const section=document.getElementById('as_section')?.value;
    const desc=document.getElementById('as_desc')?.value?.trim();
    const deadline=document.getElementById('as_deadline')?.value;
    if(!title||!section){ UI.showToast('Missing Fields','Title and section are required','warning'); return; }

    // Collect questions
    const qBlocks=document.querySelectorAll('.question-block');
    if(!qBlocks.length){ UI.showToast('No Questions','Please add at least one question','warning'); return; }
    const questions=[];
    let valid=true;
    qBlocks.forEach(block=>{
      const qid=block.id.replace('qblock_','');
      const text=document.getElementById(`${qid}_text`)?.value?.trim();
      const opts=['0','1','2','3'].map(i=>document.getElementById(`${qid}_opt${i}`)?.value?.trim()||'');
      const correctEl=document.querySelector(`input[name="${qid}_correct"]:checked`);
      if(!text||opts.some(o=>!o)||!correctEl){ valid=false; return; }
      questions.push({ id:DB.uid(), text, options:opts, correctAnswer:parseInt(correctEl.value) });
    });
    if(!valid){ UI.showToast('Incomplete Questions','Please fill all question texts, options, and mark correct answers','warning'); return; }

    const assignment={ id:DB.uid(), title, description:desc||'', deadline:deadline?new Date(deadline).toISOString():null, section, teacherId:App.currentUser.id, questions, createdAt:new Date().toISOString(), isActive:true };
    const assignments=DB.getAssignments(); assignments.push(assignment); DB.saveAssignments(assignments);

    // Notify students in section
    DB.notifySection(section,`New Assignment: ${title}`,`A new assignment has been posted for Section ${section}. Deadline: ${deadline?formatDate(deadline):'No deadline'}.`,'assignment',assignment.id);

    UI.closeModal('createAssignModal');
    UI.showToast('Assignment Created',`"${title}" has been posted to Section ${section}`,'success');
    App.showSection('assignments');
  },

                ${[...students].map(s=>{ const mySubs=subs.filter(sub=>sub.studentId===s.id); const avg=mySubs.length?Math.round(mySubs.reduce((a,b)=>a+b.score,0)/mySubs.length):null; return {student:s,avg,count:mySubs.length}; }).sort((a,b)=>(b.avg||0)-(a.avg||0)).map((item,idx)=>`<tr>
                  <td style="font-weight:700;color:${idx<3?'var(--warning)':'var(--text3)'}">

        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'rgba(128,128,128,0.1)'},ticks:{stepSize:1}}}}
      });
      const ctx2=document.getElementById('assignScoreChart');
      if(ctx2 && assignments.length){
        const labels=assignments.slice(-6).map(a=>a.title.slice(0,12)+'...');
        const data=assignments.slice(-6).map(a=>{ const s=subs.filter(b=>b.assignmentId===a.id); return s.length?Math.round(s.reduce((a,b)=>a+b.score,0)/s.length):0; });
        App.charts['assignScoreChart']=new Chart(ctx2,{
          type:'line',
          data:{labels,datasets:[{label:'Avg Score %',data,backgroundColor:'rgba(79,70,229,0.1)',borderColor:'rgba(79,70,229,1)',borderWidth:2.5,fill:true,tension:0.4,pointBackgroundColor:'rgba(79,70,229,1)',pointRadius:5}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,grid:{color:'rgba(128,128,128,0.1)'},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}

  // ---- ANNOUNCEMENTS ----
  renderAnnouncements(container){
    App.setTopbarTitle('Announcements','Post announcements to your sections');
    const teacher=App.currentUser;
    const mySections=teacher.sections||[teacher.section].filter(Boolean);
    const anns=DB.getAnnouncements().filter(a=>!a.targetSection||mySections.includes(a.targetSection)).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    container.innerHTML=`
      <div class="section-panel active">
        <div class="page-header">
          <div class="page-header-left"><h1>Announcements</h1></div>
          <div class="page-header-right">
            <button class="btn btn-primary" onclick="TeacherDash.openAnnModal()"><i class="fas fa-plus"></i> Post Announcement</button>
          </div>
        </div>
        <div id="teacherAnnList">
          ${anns.length?anns.map(a=>AdminDash.renderAnnCard(a)).join(''):`<div class="empty-state"><i class="fas fa-bullhorn"></i><h3>No announcements</h3></div>`}
        </div>
      </div>
      <div class="modal-overlay" id="teacherAnnModal">
        <div class="modal">
          <div class="modal-header"><h3>Post Announcement</h3><div class="modal-close" onclick="UI.closeModal('teacherAnnModal')"><i class="fas fa-times"></i></div></div>
          <div class="modal-body">
            <div class="field"><label>Title</label><input type="text" id="ta_title" placeholder="Title"></div>
            <div class="field"><label>Content</label><textarea id="ta_content" rows="4"></textarea></div>
            <div class="form-row">
              <div class="field"><label>Target Section</label><select id="ta_section"><option value="">All my sections</option>${mySections.map(s=>`<option value="${s}">Section ${s}</option>`).join('')}</select></div>
              <div class="field"><label>Type</label><select id="ta_type"><option value="announcement">Announcement</option><option value="reminder">Reminder</option></select></div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="UI.closeModal('teacherAnnModal')">Cancel</button>
            <button class="btn btn-primary" onclick="TeacherDash.postAnnouncement()"><i class="fas fa-paper-plane"></i> Post</button>
          </div>
        </div>
      </div>`;
  },

  openAnnModal(){ UI.openModal('teacherAnnModal'); },

  postAnnouncement(){
    const title=document.getElementById('ta_title')?.value?.trim();
    const content=document.getElementById('ta_content')?.value?.trim();
    const targetSection=document.getElementById('ta_section')?.value||null;
    const type=document.getElementById('ta_type')?.value||'announcement';
    if(!title||!content){ UI.showToast('Missing Info','Please fill in all fields','warning'); return; }
    const ann={ id:DB.uid(), title, content, authorId:App.currentUser.id, authorName:App.currentUser.name, authorRole:App.currentUser.role, targetSection, createdAt:new Date().toISOString(), type };
    const anns=DB.getAnnouncements(); anns.unshift(ann); DB.saveAnnouncements(anns);
    // Notify students
    const teacher=App.currentUser; const mySec=teacher.sections||[teacher.section].filter(Boolean);
    const targetSecs=targetSection?[targetSection]:mySec;
    targetSecs.forEach(s=>DB.notifySection(s,title,'New '+type+' from '+App.currentUser.name+': '+content.slice(0,60)+'...',type,ann.id));
    UI.closeModal('teacherAnnModal');
    UI.showToast('Posted','Announcement has been posted','success');
    App.showSection('announcements');
  }
};

/* ============================================================
   STUDENT DASHBOARD
   ============================================================ */
const StudentDash = {
  render(section, container){
    const panels = {
      'overview': ()=>this.renderOverview(container),
      'assignments': ()=>this.renderAssignments(container),
      'grades': ()=>this.renderGrades(container),
      'announcements': ()=>this.renderAnnouncements(container),
      'notifications': ()=>renderNotificationsPanel(container),
      'profile': ()=>renderProfilePanel(container),
    };
    (panels[section]||panels['overview'])();
  },

  getMyAssignments(){
    const student=App.currentUser;
    return DB.getAssignments().filter(a=>a.section===student.section&&a.isActive);
  },

  renderOverview(container){
    App.setTopbarTitle('My Dashboard','Welcome back, '+App.currentUser.name.split(' ')[0]);

    const assignments=this.getMyAssignments();
    const subs=DB.getSubmissions().filter(s=>s.studentId===student.id);

    const upcoming=pending.filter(a=>a.deadline&&!isOverdue(a.deadline));
    const unread=DB.getNotifForUser(student.id).filter(n=>!n.read).length;

    container.innerHTML=`
      <div class="section-panel active">
        <div class="page-header">
          <div class="page-header-left"><h1>Student Dashboard</h1><p>Section ${student.section||'N/A'}</p></div>
        </div>
        <div class="stats-grid">
          <div class="stat-card" style="--stat-color:#4f46e5;--stat-bg:rgba(79,70,229,0.1)">
            <div class="stat-icon"><i class="fas fa-tasks"></i></div>
            <div class="stat-info"><div class="val">${assignments.length}</div><div class="lbl">Total Assignments</div><div class="sub">In my section</div></div>
          </div>
          <div class="stat-card" style="--stat-color:#ef4444;--stat-bg:rgba(239,68,68,0.1)">
            <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
            <div class="stat-info"><div class="val">${pending.length}</div><div class="lbl">Pending</div><div class="sub">Not submitted</div></div>
          </div>
          <div class="stat-card" style="--stat-color:#22c55e;--stat-bg:rgba(34,197,94,0.1)">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div class="stat-info"><div class="val">${subs.length}</div><div class="lbl">Submitted</div><div class="sub">Completed</div></div>
          </div>
          <div class="stat-card" style="--stat-color:#f59e0b;--stat-bg:rgba(245,158,11,0.1)">
            <div class="stat-icon"><i class="fas fa-star"></i></div>
            <div class="stat-info"><div class="val">${subs.length?Math.round(subs.reduce((a,b)=>a+b.score,0)/subs.length)+'%':'N/A'}</div><div class="lbl">My Average</div><div class="sub">${subs.length?getGradeLabel(Math.round(subs.reduce((a,b)=>a+b.score,0)/subs.length)):''}</div></div>
          </div>
        </div>
        ${unread>0?`<div style="background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(6,182,212,0.08));border:1px solid rgba(79,70,229,0.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="App.showSection('notifications')">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;flex-shrink:0"><i class="fas fa-bell"></i></div>
          <div><div style="font-size:14px;font-weight:600;color:var(--text)">You have ${unread} unread notification${unread>1?'s':''}</div><div style="font-size:12px;color:var(--text3)">Click to view your notifications</div></div>
          <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--text3)"></i>
        </div>`:''}
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><h3><i class="fas fa-clock" style="color:var(--danger);margin-right:8px"></i>Upcoming Deadlines</h3><button class="btn btn-sm btn-secondary" onclick="App.showSection('assignments')">View All</button></div>
            <div class="card-body" style="padding:0">
              ${upcoming.length?upcoming.slice(0,4).map(a=>{ const soon=isDeadlineSoon(a.deadline); return `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">
                <div style="width:40px;height:40px;border-radius:10px;background:${soon?'rgba(239,68,68,0.1)':'rgba(245,158,11,0.1)'};display:flex;align-items:center;justify-content:center;color:${soon?'var(--danger)':'var(--warning)'};flex-shrink:0"><i class="fas fa-tasks"></i></div>
                <div style="flex:1"><div style="font-weight:600;font-size:13.5px">${escHtml(a.title)}</div><div style="font-size:11.5px;color:${soon?'var(--danger)':'var(--warning)'}">${formatDate(a.deadline)}</div></div>
                <button class="btn btn-sm btn-primary" onclick="StudentDash.openTakeAssignment('${a.id}')">Start</button>
              </div>`;}).join('')
              :`<div class="empty-state" style="padding:30px 20px"><i class="fas fa-check-circle" style="color:var(--success)"></i><h3>All caught up!</h3><p>No upcoming deadlines</p></div>`}
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3><i class="fas fa-chart-line" style="color:var(--primary);margin-right:8px"></i>My Grade History</h3></div>
            <div class="card-body"><div class="chart-container"><canvas id="studentGradeChart"></canvas></div></div>
          </div>
        </div>
      </div>`;
    requestAnimationFrame(()=>{
      const ctx=document.getElementById('studentGradeChart');
